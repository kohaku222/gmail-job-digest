name: Job Hunting Email Summary

on:
  schedule:
    # JST 08:30 = UTC 23:30 (前日), JST 16:30 = UTC 07:30
    # GitHub Actions cron は最大30分程度遅延するため、9時/17時に確認する前提で30分前倒し
    - cron: "30 23,7 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: job-summary
  cancel-in-progress: false

jobs:
  summarize:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Setup Python
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run summarizer
        env:
          GMAIL_CLIENT_ID: ${{ secrets.GMAIL_CLIENT_ID }}
          GMAIL_CLIENT_SECRET: ${{ secrets.GMAIL_CLIENT_SECRET }}
          GMAIL_REFRESH_TOKEN: ${{ secrets.GMAIL_REFRESH_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ secrets.SLACK_CHANNEL }}
          CLAUDE_MODEL: ${{ vars.CLAUDE_MODEL || 'claude-haiku-4-5-20251001' }}
        run: uv run python -m src.main

      - name: Commit updated state.json
        if: success()
        run: |
          if git diff --quiet state.json; then
            echo "state.json に変更なし — skip commit"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add state.json
          git commit -m "chore: update state.json [skip ci]"
          git push
